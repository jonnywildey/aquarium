<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Listen — Alphabets Heaven — Aquarium</title>
        <link rel="stylesheet" href="../css/styles.css" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="../favicon-32.png"
        />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="../apple-touch-icon.png"
        />
    </head>
    <body>
        <nav class="nav">
            <div class="container nav__inner">
                <a href="../" class="nav__logo">Alphabets Heaven</a>
                <div class="nav__links">
                    <a href="../experience/" class="nav__link">Experience</a>
                    <a href="../listen/" class="nav__link nav__link--active"
                        >Album</a
                    >
                    <a href="../creators/" class="nav__link">Creators</a>
                    <a href="../license/" class="nav__link">License</a>
                </div>
            </div>
        </nav>

        <main class="listen">
            <div class="listen__content">
                <aside class="listen__sidebar">
                    <figure class="listen__figure">
                        <img
                            src="../assets/images/albumart/aquariumhires.jpg"
                            alt="Aquarium album artwork"
                            class="listen__artwork"
                            data-lightbox="../assets/images/albumart/aquariumhires.jpg"
                        />
                        <figcaption class="artwork-credit">
                            Artwork by Shaun Ellis
                        </figcaption>
                    </figure>
                    <div class="listen__album-info">
                        <h2 class="listen__title">Alphabets Heaven</h2>
                        <p class="listen__artist">Aquarium</p>
                    </div>
                    <a
                        href="https://github.com/jonnywildey/aquarium/releases/download/V1.1/alphabets.heaven.-.aquarium.zip"
                        class="listen__download"
                        download
                    >
                        Download Album (MP3)
                    </a>
                    <a
                        href="https://github.com/jonnywildey/aquarium/releases/download/V1.0/alphabets.heaven.-.aquarium.wav.zip"
                        class="listen__download"
                        download
                    >
                        Download Album (WAV)
                    </a>
                </aside>

                <section class="player">
                    <ul id="track-list" class="player__track-list">
                        <!-- Track list rendered by JavaScript -->
                    </ul>
                    <p class="composition">All compositions by Jonny Wildey</p>
                </section>
            </div>
        </main>

        <!-- Player Controls -->
        <div class="player__controls">
            <div class="player__controls-inner">
                <div class="player__now-playing">
                    <span id="current-track" class="player__current-track"
                        >Shore</span
                    >
                    <span class="player__current-artist">Alphabets Heaven</span>
                </div>

                <div class="player__main-controls">
                    <div class="player__buttons">
                        <button
                            id="prev-btn"
                            class="player__btn"
                            aria-label="Previous track"
                        >
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <polygon points="19,20 9,12 19,4" />
                                <rect x="5" y="4" width="2" height="16" />
                            </svg>
                        </button>
                        <button
                            id="play-btn"
                            class="player__btn player__btn--play"
                            aria-label="Play"
                        >
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <polygon points="5,3 19,12 5,21" />
                            </svg>
                        </button>
                        <button
                            id="next-btn"
                            class="player__btn"
                            aria-label="Next track"
                        >
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <polygon points="5,4 15,12 5,20" />
                                <rect x="17" y="4" width="2" height="16" />
                            </svg>
                        </button>
                    </div>

                    <div class="player__progress-container">
                        <span
                            id="current-time"
                            class="player__time player__time--current"
                            >0:00</span
                        >
                        <div id="progress" class="player__progress">
                            <div
                                id="progress-bar"
                                class="player__progress-bar"
                            ></div>
                        </div>
                        <span id="duration" class="player__time">0:00</span>
                    </div>
                </div>

                <div class="player__volume">
                    <svg
                        viewBox="0 0 24 24"
                        fill="currentColor"
                        width="16"
                        height="16"
                    >
                        <path
                            d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"
                        />
                    </svg>
                    <div id="volume-slider" class="player__volume-slider">
                        <div id="volume-bar" class="player__volume-bar"></div>
                    </div>
                </div>
            </div>
        </div>

        <script src="../js/lightbox.js"></script>
        <script src="../js/player.js"></script>
    </body>
</html>
