<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Creators Content — Alphabets Heaven</title>
        <link rel="stylesheet" href="../css/styles.css" />
        <link rel="stylesheet" href="../css/creators.css" />
        <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32.png">
        <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
    </head>
    <body>
        <nav class="nav">
            <div class="container nav__inner">
                <a href="../" class="nav__logo">Alphabets Heaven</a>
                <div class="nav__links">
                    <a href="../experience/" class="nav__link">Experience</a>
                    <a href="../listen/" class="nav__link">Album</a>
                    <a href="../creators/" class="nav__link nav__link--active">Creators</a>
                    <a href="../license/" class="nav__link">License</a>
                </div>
            </div>
        </nav>

        <main class="creators">
            <div class="creators__header">
                <div class="container">
                    <h1 class="creators__title">Creators Content</h1>
                    <p class="creators__description">
                        Short-form audio clips for aquarium social media
                        content. Free to use with credit to Alphabets Heaven.
                    </p>
                </div>
            </div>

            <div class="creators__content container">
                <div class="filter">
                    <div class="filter__group">
                        <button class="filter__btn" data-filter="all">
                            All
                        </button>
                        <button class="filter__btn is-active" data-filter="selected">
                            Selected
                        </button>
                        <button class="filter__btn" data-filter="uplifting">
                            Uplifting
                        </button>
                        <button class="filter__btn" data-filter="ambient">
                            Ambient
                        </button>
                        <button class="filter__btn" data-filter="dark">
                            Dark
                        </button>
                        <button class="filter__btn" data-filter="energetic">
                            Energetic
                        </button>
                    </div>
                    <span id="track-count" class="filter__count">0 tracks</span>
                </div>

                <section class="player">
                    <ul
                        id="track-list"
                        class="player__track-list creators__track-list"
                    >
                        <!-- Track list rendered by JavaScript -->
                    </ul>
                </section>
            </div>
        </main>

        <!-- Player Controls -->
        <div class="player__controls">
            <div class="player__controls-inner">
                <div class="player__now-playing">
                    <span id="current-track" class="player__current-track"
                        >Select a track</span
                    >
                    <span class="player__current-artist">Alphabets Heaven</span>
                </div>

                <div class="player__main-controls">
                    <div class="player__buttons">
                        <button
                            id="prev-btn"
                            class="player__btn"
                            aria-label="Previous track"
                        >
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <polygon points="19,20 9,12 19,4" />
                                <rect x="5" y="4" width="2" height="16" />
                            </svg>
                        </button>
                        <button
                            id="play-btn"
                            class="player__btn player__btn--play"
                            aria-label="Play"
                        >
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <polygon points="5,3 19,12 5,21" />
                            </svg>
                        </button>
                        <button
                            id="next-btn"
                            class="player__btn"
                            aria-label="Next track"
                        >
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <polygon points="5,4 15,12 5,20" />
                                <rect x="17" y="4" width="2" height="16" />
                            </svg>
                        </button>
                    </div>

                    <div class="player__progress-container">
                        <span
                            id="current-time"
                            class="player__time player__time--current"
                            >0:00</span
                        >
                        <div id="progress" class="player__progress">
                            <div
                                id="progress-bar"
                                class="player__progress-bar"
                            ></div>
                        </div>
                        <span id="duration" class="player__time">0:00</span>
                    </div>
                </div>

                <div class="player__volume"></div>
            </div>
        </div>

        <script src="../js/creators.js"></script>
    </body>
</html>
